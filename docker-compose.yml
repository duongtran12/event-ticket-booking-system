services:
  mysql:
    image: mysql:8.0
    container_name: eventticket-mysql

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: event_ticket_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventticket-app
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/event_ticket_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      JWT_SECRET: mySecretKeyMySecretKeyMySecretKey123456NeedToBeAtLeast32BytesLong
    ports:
      - "8080:8080"

volumes:
  mysql_data: