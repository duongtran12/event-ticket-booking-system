spring:
  application:
    name: eventticket

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/event_ticket_db}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8081

app:
  mail:
    from: ${MAIL_FROM:no-reply@eventticket.local}

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000

vnpay:
  tmnCode: ${VNPAY_TMN_CODE:QAM9V9WJ}
  hashSecret: ${VNPAY_HASH_SECRET:}
  payUrl: ${VNPAY_PAY_URL:}
  returnUrl: ${VNPAY_RETURN_URL:}
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-3.5-flash}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-3.5-turbo}

chat:
  provider: ${CHAT_PROVIDER:gemini}
